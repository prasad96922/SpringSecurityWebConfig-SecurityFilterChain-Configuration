<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(
                    135deg,
                    #4285F4,
                    #34A853,
                    #FBBC05,
                    #EA4335
            );
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 50px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .google-icon {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: bold;
            color: #4285F4;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
        }

        .success {
            font-size: 1.3rem;
            color: #d4ffdb;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            font-size: 1rem;
            line-height: 1.8;
            opacity: 0.95;
        }

        .badge {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 35px;
            border-radius: 30px;
            text-decoration: none;
            color: #4285F4;
            background: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.3);
        }

        @media(max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <div class="google-icon">G</div>

        <h1>Welcome Home 🎉</h1>

        <div class="success">
            Successfully Logged In with Google OAuth2
        </div>

        <p>
            Authentication completed successfully.
            You now have secure access to the application using your
            Google account.
        </p>

        <div class="badge">
            ✓ OAuth2 Authentication Verified
        </div>

        <br>

        <a href="/posts" class="btn">
            Go to Dashboard →
        </a>

    </div>
</div>

</body>
</html>
